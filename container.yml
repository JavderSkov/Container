---
- name: Create Debian LXC Container in Proxmox
  hosts: localhost
  gather_facts: false
  vars:
    # Proxmox API connection details
    api_host: "10.101.7.27"               # Replace with your Proxmox IP
    api_user: "root@pam"                   # Or your API token user (e.g., user@pve!token_id)
    api_password: "Kode1234!" # Or api_token_secret if using tokens
    pve_node: "jasper"                        # The name of your Proxmox node

    # Container configuration
    lxc_vmid: 200
    lxc_hostname: "debian-server"
    lxc_password: "RootPassword123!"       # Root password for the new container
    
    # Template and Storage
    # Note: Ensure this template is already downloaded to your Proxmox storage
    lxc_template: "local:vztmpl/debian-12-standard_12.2-1_amd64.tar.zst" 
    lxc_storage: "local-lvm"
    
    # Resources
    lxc_cores: 2
    lxc_memory: 2048 # in MB
    lxc_swap: 512    # in MB

  tasks:
    - name: Create the Debian container
      community.general.proxmox:
        api_host: "{{ api_host }}"
        api_user: "{{ api_user }}"
        api_password: "{{ api_password }}"
        # Use api_token_id and api_token_secret instead of api_password if using API tokens
        validate_certs: false # Set to true if you have a valid SSL cert on Proxmox
        node: "{{ pve_node }}"
        vmid: "{{ lxc_vmid }}"
        hostname: "{{ lxc_hostname }}"
        password: "{{ lxc_password }}"
        ostemplate: "{{ lxc_template }}"
        storage: "{{ lxc_storage }}"
        cores: "{{ lxc_cores }}"
        memory: "{{ lxc_memory }}"
        swap: "{{ lxc_swap }}"
        netif: '{"net0":"name=eth0,ip=dhcp,bridge=vmbr0"}'
        unprivileged: true
        state: present

    - name: Start the container
      community.general.proxmox:
        api_host: "{{ api_host }}"
        api_user: "{{ api_user }}"
        api_password: "{{ api_password }}"
        validate_certs: false
        node: "{{ pve_node }}"
        vmid: "{{ lxc_vmid }}"
        state: started
