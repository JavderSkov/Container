---
- name: Create Debian LXC Container in Proxmox
  hosts: localhost
  gather_facts: false
  vars:
    # Proxmox API login
    api_host: "10.101.7.27"
    api_user: "root@pam"         # <-- Denne SKAL være her
    api_token_id: "jasp"      # <-- KUN navnet på din token, fjern 'root@pam!'
    api_token_secret: "6902d28d-2d72-45c6-9b72-5297fca8feb5"
    pve_node: "jasper"              # <-- Ret dette hvis din Proxmox node hedder noget andet

    # Container opsætning
    lxc_vmid: 200
    lxc_hostname: "debian-server"
    lxc_password: "RootPassword123!"
    
    # Skabelon og disk
    lxc_template: "local:vztmpl/debian-12-standard_12.2-1_amd64.tar.zst" 
    lxc_storage: "local-lvm"
    
    # Ressourcer
    lxc_cores: 2
    lxc_memory: 2048
    lxc_swap: 512

  tasks:
    - name: Create the Debian container
      community.general.proxmox:
        api_host: "{{ api_host }}"
        api_user: "{{ api_user }}"             # <-- Tilføjet her
        api_token_id: "{{ api_token_id }}"
        api_token_secret: "{{ api_token_secret }}"
        validate_certs: false
        node: "{{ pve_node }}"
        vmid: "{{ lxc_vmid }}"
        hostname: "{{ lxc_hostname }}"
        password: "{{ lxc_password }}"
        ostemplate: "{{ lxc_template }}"
        storage: "{{ lxc_storage }}"
        cores: "{{ lxc_cores }}"
        memory: "{{ lxc_memory }}"
        swap: "{{ lxc_swap }}"
        netif: '{"net0":"name=eth0,ip=dhcp,bridge=vmbr0"}'
        unprivileged: true
        state: present

    - name: Start the container
      community.general.proxmox:
        api_host: "{{ api_host }}"
        api_user: "{{ api_user }}"             # <-- Tilføjet her
        api_token_id: "{{ api_token_id }}"
        api_token_secret: "{{ api_token_secret }}"
        validate_certs: false
        node: "{{ pve_node }}"
        vmid: "{{ lxc_vmid }}"
        state: started
